name: Infrastructure

on:
  pull_request:
    paths:
      - 'docker-compose*.yml'
      - 'k8s/**'
      - 'infra/**'
      - '.github/workflows/infrastructure.yml'
  push:
    branches:
      - main
    paths:
      - 'docker-compose*.yml'
      - 'k8s/**'
      - 'infra/**'
      - '.github/workflows/infrastructure.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose
        run: |
          docker compose -f docker-compose.yml config
          docker compose -f docker-compose.phase-2.yml config
      - name: Validate Kubernetes manifests
        uses: instrumenta/kubeval-action@master
        with:
          files: k8s/phase-2
