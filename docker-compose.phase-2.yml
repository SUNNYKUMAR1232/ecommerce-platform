services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      PORT: ${GATEWAY_PORT:-3000}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-jwt-secret}
      SERVICE_DISCOVERY_URL: http://consul:8500
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-300}
    depends_on:
      consul:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    networks:
      - platform

  consul:
    image: hashicorp/consul:1.20
    command: agent -server -ui -client=0.0.0.0 -bootstrap-expect=1 -datacenter=dc1
    ports:
      - '8500:8500'
    healthcheck:
      test: ['CMD', 'consul', 'info']
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-ecom}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-ecom123}
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'check_port_connectivity']
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - platform

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-ecom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecom123}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ecom} -d ${POSTGRES_DB:-ecommerce}']
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-ecom}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-ecom123}
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand({ ping: 1 })']
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - platform

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - '9200:9200'
      - '9300:9300'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:9200/_cluster/health || exit 1']
      interval: 20s
      timeout: 10s
      retries: 6
    networks:
      - platform

  neo4j:
    image: neo4j:5.23
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/ecom12345}
    ports:
      - '7474:7474'
      - '7687:7687'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:7474 || exit 1']
      interval: 20s
      timeout: 10s
      retries: 6
    networks:
      - platform

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - '8123:8123'
      - '9002:9000'
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ['CMD-SHELL', "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 6
    networks:
      - platform

  minio:
    image: minio/minio:RELEASE.2024-08-17T01-24-54Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - '9004:9000'
      - '9003:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:9000/minio/health/live || exit 1']
      interval: 20s
      timeout: 10s
      retries: 6
    networks:
      - platform

  vault:
    image: hashicorp/vault:1.18
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_ROOT_TOKEN:-root}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: server -dev
    ports:
      - '8200:8200'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:8200/v1/sys/health || exit 1']
      interval: 20s
      timeout: 10s
      retries: 6
    networks:
      - platform

  loki:
    image: grafana/loki:3.1.1
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - '3100:3100'
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - platform

  promtail:
    image: grafana/promtail:3.1.1
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - loki
    networks:
      - platform

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    ports:
      - '9090:9090'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - platform

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - '9093:9093'
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - platform

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
    ports:
      - '3001:3000'
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - platform

  jaeger:
    image: jaegertracing/all-in-one:1.58
    ports:
      - '16686:16686'
      - '4317:4317'
      - '4318:4318'
    networks:
      - platform

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    ports:
      - '8888:8888'
      - '9464:9464'
    volumes:
      - ./infra/otel/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - jaeger
      - prometheus
    networks:
      - platform

  node-exporter:
    image: prom/node-exporter:v1.8.2
    ports:
      - '9100:9100'
    networks:
      - platform

networks:
  platform:
    driver: bridge

volumes:
  rabbitmq_data:
  postgres_data:
  mongodb_data:
  redis_data:
  elasticsearch_data:
  neo4j_data:
  clickhouse_data:
  minio_data:
  loki_data:
  prometheus_data:
  grafana_data:
